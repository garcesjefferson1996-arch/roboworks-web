<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materiales - RoboWorks</title>
    <link rel="stylesheet" href="/css/plataforma.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            padding-bottom: 80px;
        }
        .materials-header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-bottom: 4px solid #ffd700;
        }
        .header-left { display: flex; align-items: center; gap: 1rem; }
        .back-btn {
            background: #667eea;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .header-left h1 { font-size: 1.5rem; color: #4834d4; }
        .user-avatar {
            width: 45px;
            height: 45px;
            background: #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #4834d4;
            border: 3px solid white;
        }
        .materials-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .class-selector-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .class-selector-card h2 { display: flex; align-items: center; gap: 0.5rem; color: #4834d4; margin-bottom: 1rem; }
        .class-selector-card select {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0ff;
            border-radius: 15px;
            font-family: inherit;
            font-size: 1rem;
        }
        .materials-section {
            background: white;
            border-radius: 30px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .class-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f0f0ff;
        }
        .class-info h3 { font-size: 1.8rem; color: #4834d4; }
        .program-badge {
            background: #ffd700;
            color: #4834d4;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
        }
        .categories-filter {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .category-chip {
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            background: #f0f0ff;
            color: #666;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .category-chip.active { background: #667eea; color: white; border-color: #ffd700; }
        .materials-grid { display: grid; gap: 1rem; }
        .material-card {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 1.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            border-left: 4px solid #667eea;
        }
        .material-card:hover { transform: translateX(5px); box-shadow: 0 5px 20px rgba(102,126,234,0.2); }
        .material-icon {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }
        .material-info { flex: 1; }
        .material-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .material-category {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 50px;
            color: white;
            font-weight: 500;
        }
        .material-description { font-size: 0.9rem; color: #666; }
        .material-meta { font-size: 0.8rem; color: #999; margin-top: 0.3rem; }
        .material-action { color: #667eea; font-size: 1.2rem; opacity: 0.5; }
        .material-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .material-modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 2rem;
            width: 90%;
            max-width: 700px;
            animation: slideIn 0.3s ease-out;
        }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 1.5rem; }
        .close-modal { background: none; border: none; font-size: 2rem; cursor: pointer; }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            margin: 1rem 0;
            border-radius: 15px;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .file-download {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 1rem 2rem;
            border-radius: 15px;
            text-decoration: none;
            margin: 1rem 0;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #999;
            padding: 0.5rem 1rem;
            border-radius: 50px;
        }
        .nav-item.active { color: #667eea; background: #f0f0ff; }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .loading { text-align: center; padding: 3rem; }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header class="materials-header">
        <div class="header-left">
            <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <h1><i class="fas fa-folder-open"></i> Biblioteca Robotista</h1>
        </div>
        <div class="user-avatar" id="userAvatar"><i class="fas fa-robot"></i></div>
    </header>

    <main class="materials-container">
        <div class="class-selector-card">
            <h2><i class="fas fa-calendar-alt"></i> Selecciona tu clase</h2>
            <select id="classSelect" onchange="loadMaterials()">
                <option value="">Cargando tus clases...</option>
            </select>
        </div>

        <div id="materialsSection" class="materials-section" style="display: none;">
            <div class="class-info">
                <h3 id="className">-</h3>
                <span class="program-badge" id="programName">-</span>
            </div>

            <div class="categories-filter" id="categoriesFilter">
                <button class="category-chip active" onclick="filterByCategory('all')">Todos</button>
            </div>

            <div id="materialsLoading" class="loading"><div class="loading-spinner"></div><p>Cargando materiales...</p></div>

            <div id="materialsGrid" class="materials-grid"></div>
        </div>
    </main>

    <div id="materialModal" class="material-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">-</h3>
                <button class="close-modal" onclick="closeMaterialModal()">&times;</button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="clase.html" class="nav-item"><i class="fas fa-video"></i><span>Clase</span></a>
        <a href="materiales.html" class="nav-item active"><i class="fas fa-folder-open"></i><span>Materiales</span></a>
    </nav>

    <script>
        function formatDay(day) {
            const days = { monday: 'Lunes', tuesday: 'Martes', wednesday: 'Miércoles', thursday: 'Jueves', friday: 'Viernes', saturday: 'Sábado' };
            return days[day] || day;
        }

        function extractYoutubeId(url) {
            const match = url.match(/^.*(youtu.be\/|v\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        let currentMaterials = [];
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', function() {
            const student = JSON.parse(localStorage.getItem('currentStudent'));
            if (!student) { window.location.href = 'login.html'; return; }

            const classes = JSON.parse(localStorage.getItem('roboworks_classes') || '[]');
            const programs = JSON.parse(localStorage.getItem('roboworks_programs') || '[]');
            const allMaterials = JSON.parse(localStorage.getItem('roboworks_materials') || '[]');
            
            const studentClassIds = student.class_ids || [];
            const studentClasses = classes.filter(c => studentClassIds.includes(c.id));
            
            const select = document.getElementById('classSelect');
            select.innerHTML = '<option value="">Selecciona una clase</option>';
            
            studentClasses.forEach(cls => {
                const program = programs.find(p => p.id === cls.program_id);
                const option = document.createElement('option');
                option.value = cls.id;
                option.textContent = `${cls.name} (${program?.name || ''})`;
                select.appendChild(option);
            });

            window.loadMaterials = function() {
                const classId = parseInt(document.getElementById('classSelect').value);
                if (!classId) { document.getElementById('materialsSection').style.display = 'none'; return; }

                document.getElementById('materialsSection').style.display = 'block';
                document.getElementById('materialsLoading').style.display = 'block';
                
                const cls = classes.find(c => c.id === classId);
                const program = programs.find(p => p.id === cls?.program_id);
                
                document.getElementById('className').textContent = cls?.name || '';
                document.getElementById('programName').textContent = program?.name || '';
                
                currentMaterials = allMaterials.filter(m => m.class_id === classId && m.is_active !== false);
                
                document.getElementById('materialsLoading').style.display = 'none';
                
                const categories = [...new Set(currentMaterials.map(m => m.category_id).filter(Boolean))];
                const filterDiv = document.getElementById('categoriesFilter');
                filterDiv.innerHTML = '<button class="category-chip active" onclick="filterByCategory(\'all\')">Todos</button>';
                
                categories.forEach(catId => {
                    const btn = document.createElement('button');
                    btn.className = 'category-chip';
                    btn.textContent = 'Categoría ' + catId;
                    btn.onclick = () => filterByCategory(catId);
                    filterDiv.appendChild(btn);
                });

                displayMaterials();
            };

            window.filterByCategory = function(categoryId) {
                currentFilter = categoryId;
                document.querySelectorAll('.category-chip').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
                displayMaterials();
            };

            function displayMaterials() {
                const container = document.getElementById('materialsGrid');
                
                let filtered = currentMaterials;
                if (currentFilter !== 'all') {
                    filtered = currentMaterials.filter(m => m.category_id == currentFilter);
                }
                
                if (filtered.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 2rem;">No hay materiales disponibles</div>';
                    return;
                }
                
                let html = '';
                filtered.forEach(m => {
                    const icon = { link: '🔗', file: '📁', video: '🎥', code: '💻' }[m.material_type] || '📄';
                    html += `
                        <div class="material-card" onclick="openMaterial(${m.id})">
                            <div class="material-icon">${icon}</div>
                            <div class="material-info">
                                <div class="material-title">${m.title}</div>
                                <div class="material-description">${m.description || ''}</div>
                            </div>
                            <div class="material-action"><i class="fas fa-chevron-right"></i></div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }

            window.openMaterial = function(id) {
                const material = currentMaterials.find(m => m.id === id);
                if (!material) return;
                
                document.getElementById('modalTitle').textContent = material.title;
                let content = '';
                
                if (material.material_type === 'link') {
                    content = `<a href="${material.external_link}" target="_blank" class="file-download">Abrir enlace</a>`;
                } else if (material.material_type === 'video' && material.external_link) {
                    const videoId = extractYoutubeId(material.external_link);
                    if (videoId) {
                        content = `<div class="video-container"><iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe></div>`;
                    }
                }
                
                document.getElementById('modalContent').innerHTML = content;
                document.getElementById('materialModal').classList.add('active');
            };

            window.closeMaterialModal = function() {
                document.getElementById('materialModal').classList.remove('active');
            };
        });
    </script>
</body>
</html>
