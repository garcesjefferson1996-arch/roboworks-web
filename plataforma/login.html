<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso a la Plataforma - RoboWorks</title>
    <link rel="stylesheet" href="/css/plataforma.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico">
    <style>
        .login-body {
            background: linear-gradient(135deg, #6a3bc2 0%, #8a5cde 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        
        .login-container {
            background-color: white;
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.6s ease-out;
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-logo img {
            height: 50px;
            width: auto;
            margin-bottom: 1rem;
        }
        
        .login-logo h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            color: #333344;
            margin-bottom: 0.5rem;
        }
        
        .login-logo p {
            color: #666677;
            font-size: 0.95rem;
        }
        
        .login-form .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333344;
            font-size: 0.9rem;
        }
        
        .form-label i {
            color: #6a3bc2;
            margin-right: 0.5rem;
        }
        
        .form-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #dde1f0;
            border-radius: 12px;
            font-family: 'Open Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #6a3bc2;
            box-shadow: 0 0 0 3px rgba(106, 59, 194, 0.1);
        }
        
        .form-input.error {
            border-color: #dc2626;
            background-color: rgba(220, 38, 38, 0.02);
        }
        
        .form-hint {
            display: block;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #888899;
        }
        
        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #6a3bc2, #8a5cde);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.7rem;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
        }
        
        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(106, 59, 194, 0.3);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-message {
            padding: 1rem;
            border-radius: 10px;
            margin: 1.5rem 0;
            text-align: center;
            display: none;
            animation: slideIn 0.3s ease-out;
        }
        
        .message-error {
            background-color: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border-left: 4px solid #dc2626;
        }
        
        .message-success {
            background-color: rgba(16, 185, 129, 0.1);
            color: #059669;
            border-left: 4px solid #059669;
        }
        
        .message-warning {
            background-color: rgba(245, 158, 11, 0.1);
            color: #d97706;
            border-left: 4px solid #d97706;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
            color: #666677;
            font-size: 0.85rem;
        }
        
        .login-footer a {
            color: #6a3bc2;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        .password-toggle {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666677;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.5rem;
            z-index: 10;
        }
        
        .toggle-password:hover {
            color: #6a3bc2;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
            }
            .login-logo h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-logo">
            <img src="/assets/icons/logo.png" alt="RoboWorks Academy Logo">
            <h1>¡Bienvenido, Robotista!</h1>
            <p>Ingresa tus datos para continuar tu aventura</p>
        </div>
        
        <div id="login-message" class="login-message" role="alert" aria-live="polite">
            <i class="fas fa-exclamation-circle" aria-hidden="true"></i>
            <span id="message-text"></span>
        </div>
        
        <form id="loginForm" class="login-form" novalidate>
            <div class="form-group">
                <label for="username" class="form-label">
                    <i class="fas fa-user" aria-hidden="true"></i> Usuario
                </label>
                <input type="text" id="username" name="username" class="form-input" placeholder="ejemplo: robo-1234" required>
            </div>
            
            <div class="form-group password-toggle">
                <label for="password" class="form-label">
                    <i class="fas fa-lock" aria-hidden="true"></i> Contraseña
                </label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Tu contraseña secreta" required>
                <button type="button" class="toggle-password" id="togglePassword">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            
            <button type="submit" class="login-btn" id="submitBtn">
                <i class="fas fa-sign-in-alt"></i>
                <span id="btnText">Ingresar a la Plataforma</span>
                <span id="btnSpinner" class="spinner" style="display: none;"></span>
            </button>
        </form>
        
        <div class="login-footer">
            <p>¿Problemas para acceder? <a href="mailto:soporte@roboworks.site">Contáctanos</a></p>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- 🔥 FIREBASE - CONFIGURACIÓN CORREGIDA 🔥 -->
    <!-- ============================================ -->
    <!-- Versión 8 de Firebase (compatible con nuestro código) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // 🔥 Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDYbas3MnL0u5wOyXO1Ok70lC3wSIGb0gM",
            authDomain: "roboworks-app.firebaseapp.com",
            projectId: "roboworks-app",
            storageBucket: "roboworks-app.firebasestorage.app",
            messagingSenderId: "824986583831",
            appId: "1:824986583831:web:7477911bd5cb95a18a6d52"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        console.log('🔥 Firebase conectado correctamente');
        console.log('📦 Firestore listo');
    </script>

    <script>
        // ============================================
        // CÓDIGO DE LOGIN CORREGIDO - CON FIREBASE
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const togglePasswordBtn = document.getElementById('togglePassword');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const loginMessage = document.getElementById('login-message');
            const messageText = document.getElementById('message-text');

            let isSubmitting = false;

            togglePasswordBtn.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.querySelector('i').className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
            });

            function showMessage(text, type = 'error') {
                messageText.textContent = text;
                loginMessage.className = `login-message message-${type}`;
                loginMessage.style.display = 'block';
                
                if (type === 'success') {
                    setTimeout(() => loginMessage.style.display = 'none', 3000);
                }
            }

            function setLoadingState(isLoading) {
                isSubmitting = isLoading;
                submitBtn.disabled = isLoading;
                btnText.style.display = isLoading ? 'none' : 'inline';
                btnSpinner.style.display = isLoading ? 'inline-block' : 'none';
            }

            // === FUNCIÓN DE LOGIN CORREGIDA - BUSCA EN FIREBASE ===
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                if (isSubmitting) return;

                const username = usernameInput.value.trim();
                const password = passwordInput.value;

                if (!username || !password) {
                    showMessage('Por favor, ingresa usuario y contraseña', 'error');
                    return;
                }

                setLoadingState(true);

                // Verificar admin
                if (username === 'admin' && password === 'admin123') {
                    localStorage.setItem('isAdmin', 'true');
                    showMessage('Bienvenido Administrador', 'success');
                    setTimeout(() => window.location.href = 'admin/dashboard.html', 1000);
                    return;
                }

                // ✅ VERIFICAR ESTUDIANTE EN FIREBASE
                db.collection('students')
                    .where('username', '==', username)
                    .where('password', '==', password)
                    .get()
                    .then((querySnapshot) => {
                        if (!querySnapshot.empty) {
                            // Estudiante encontrado
                            const studentDoc = querySnapshot.docs[0];
                            const student = { 
                                id: studentDoc.id, 
                                ...studentDoc.data() 
                            };
                            
                            // Guardar en localStorage
                            localStorage.setItem('currentStudent', JSON.stringify(student));
                            
                            // Mostrar mensaje de éxito
                            showMessage(`¡Bienvenido ${student.full_name || student.name || 'Estudiante'}!`, 'success');
                            
                            // Redirigir al dashboard
                            setTimeout(() => window.location.href = 'dashboard.html', 1000);
                        } else {
                            // No se encontró el estudiante
                            showMessage('Usuario o contraseña incorrectos', 'error');
                            passwordInput.value = '';
                            setLoadingState(false);
                        }
                    })
                    .catch((error) => {
                        console.error('❌ Error en login:', error);
                        showMessage('Error al conectar con el servidor. Intenta de nuevo.', 'error');
                        setLoadingState(false);
                    });
            });
        });
    </script>
</body>
</html>
